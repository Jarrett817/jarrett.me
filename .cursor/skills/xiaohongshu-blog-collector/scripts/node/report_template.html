<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>小红书博主采集分析报告</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', "Segoe UI", "Microsoft YaHei", sans-serif; background-color: #f8fafc; }
        .chart-container { position: relative; height: 300px; width: 100%; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
    </style>
</head>
<body class="text-slate-800 antialiased">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <header class="mb-10 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">小红书博主采集分析报告</h1>
                <p id="meta-updated" class="mt-2 text-sm text-slate-500 font-medium italic"></p>
            </div>
            <div class="flex items-center gap-3">
                <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-red-100 text-red-800">
                    <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20"><path d="M2 10.5a1.5 1.5 0 113 0v6a1.5 1.5 0 01-3 0v-6zM6 10.333v5.43a2 2 0 001.106 1.79l.05.025A4 4 0 008.943 18h5.416a2 2 0 001.962-1.608l1.2-6A2 2 0 0015.56 8H12V4a2 2 0 00-2-2 1 1 0 00-1 1v.667a4 4 0 01-.8 2.4L6.8 10.333z"></path></svg>
                    数据驱动分析
                </span>
            </div>
        </header>

        <!-- Dashboard Stats -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="glass-card rounded-2xl p-6 shadow-sm">
                <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-1">笔记总数</p>
                <div class="flex items-end justify-between">
                    <h2 id="stat-total" class="text-3xl font-bold text-slate-900">0</h2>
                    <div class="p-2 bg-blue-50 text-blue-600 rounded-lg"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg></div>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-6 shadow-sm">
                <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-1">累计获赞</p>
                <div class="flex items-end justify-between">
                    <h2 id="stat-likes" class="text-3xl font-bold text-slate-900">0</h2>
                    <div class="p-2 bg-pink-50 text-pink-600 rounded-lg"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg></div>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-6 shadow-sm">
                <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-1">累计评论</p>
                <div class="flex items-end justify-between">
                    <h2 id="stat-comments" class="text-3xl font-bold text-slate-900">0</h2>
                    <div class="p-2 bg-purple-50 text-purple-600 rounded-lg"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg></div>
                </div>
            </div>
            <div class="glass-card rounded-2xl p-6 shadow-sm">
                <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-1">累计收藏</p>
                <div class="flex items-end justify-between">
                    <h2 id="stat-collects" class="text-3xl font-bold text-slate-900">0</h2>
                    <div class="p-2 bg-amber-50 text-amber-600 rounded-lg"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg></div>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
            <!-- Tag Distribution -->
            <div class="glass-card rounded-2xl p-6 shadow-sm">
                <h3 class="text-lg font-bold text-slate-900 mb-6 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>
                    热门标签 TOP 10
                </h3>
                <div class="chart-container">
                    <canvas id="tagChart"></canvas>
                </div>
            </div>
            <!-- Interaction Ratio -->
            <div class="glass-card rounded-2xl p-6 shadow-sm">
                <h3 class="text-lg font-bold text-slate-900 mb-6 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>
                    互动行为占比
                </h3>
                <div class="chart-container flex items-center justify-center">
                    <canvas id="ratioChart"></canvas>
                </div>
            </div>
            <!-- Style Analysis -->
            <div class="glass-card rounded-2xl p-6 shadow-sm">
                <h3 class="text-lg font-bold text-slate-900 mb-6 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                    博主风格画像
                </h3>
                <div id="style-profile" class="space-y-4">
                    <!-- Style metrics will be injected here -->
                </div>
            </div>
        </div>

        <!-- Feed Section -->
        <section>
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                <h3 class="text-xl font-bold text-slate-900">内容库</h3>
                <div class="flex flex-wrap items-center gap-3">
                    <div class="relative">
                        <input id="q" type="text" placeholder="搜索内容、标签..." class="w-64 pl-10 pr-4 py-2 border border-slate-200 rounded-xl bg-white text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none">
                        <svg class="w-5 h-5 absolute left-3 top-2.5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <select id="s" class="px-4 py-2 border border-slate-200 rounded-xl bg-white text-sm focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
                        <option value="publish_time">最新发布</option>
                        <option value="time">最新抓取</option>
                        <option value="likes">最多点赞</option>
                        <option value="comments">最多评论</option>
                        <option value="collects">最多收藏</option>
                    </select>
                </div>
            </div>

            <div id="list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                <!-- Cards will be injected here -->
            </div>
        </section>
    </div>

    <script>
        const D = __DATA__;

        // Utility to parse human-readable counts (e.g., "1.2w" -> 12000)
        const parseCount = v => {
            const s = String(v || "").toLowerCase();
            const m = s.match(/[\\d.]+/);
            if (!m) return 0;
            let x = parseFloat(m[0]);
            if (s.includes("w") || s.includes("万")) x *= 10000;
            if (s.includes("k") || s.includes("千")) x *= 1000;
            return Math.round(x) || 0;
        };

        const state = { q: "", s: "time" };

        const getFilteredList = () => {
            let posts = (D.posts || []).filter(p => {
                const searchStr = [p.title, p.content_text, ...(p.tags || []), p.post_id].join(" ").toLowerCase();
                return searchStr.includes(state.q.toLowerCase());
            });

            if (state.s === "likes") posts.sort((a, b) => parseCount(b.like_count_text) - parseCount(a.like_count_text));
            else if (state.s === "comments") posts.sort((a, b) => parseCount(b.comment_count_text) - parseCount(a.comment_count_text));
            else if (state.s === "collects") posts.sort((a, b) => parseCount(b.collect_count_text) - parseCount(a.collect_count_text));
            else if (state.s === "publish_time") posts.sort((a, b) => String(b.publish_time_text || "").localeCompare(String(a.publish_time_text || "")));
            else posts.sort((a, b) => String(b.captured_at || "").localeCompare(String(a.captured_at || "")));

            return posts;
        };

        function renderStats() {
            const posts = D.posts || [];
            document.getElementById("stat-total").textContent = posts.length;
            document.getElementById("stat-likes").textContent = posts.reduce((acc, p) => acc + parseCount(p.like_count_text), 0).toLocaleString();
            document.getElementById("stat-comments").textContent = posts.reduce((acc, p) => acc + parseCount(p.comment_count_text), 0).toLocaleString();
            document.getElementById("stat-collects").textContent = posts.reduce((acc, p) => acc + parseCount(p.collect_count_text), 0).toLocaleString();
            document.getElementById("meta-updated").textContent = `更新于: ${D.meta?.updated_at || new Date().toISOString()}`;
        }

        function renderCharts() {
            const posts = D.posts || [];
            
            // Tag Chart
            const tagMap = {};
            posts.forEach(p => (p.tags || []).forEach(t => tagMap[t] = (tagMap[t] || 0) + 1));
            const sortedTags = Object.entries(tagMap).sort((a, b) => b[1] - a[1]).slice(0, 10);
            
            new Chart(document.getElementById('tagChart'), {
                type: 'bar',
                data: {
                    labels: sortedTags.map(t => t[0]),
                    datasets: [{
                        label: '出现频率',
                        data: sortedTags.map(t => t[1]),
                        backgroundColor: 'rgba(99, 102, 241, 0.7)',
                        borderRadius: 8
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            // Ratio Chart
            const totalLikes = posts.reduce((acc, p) => acc + parseCount(p.like_count_text), 0);
            const totalComments = posts.reduce((acc, p) => acc + parseCount(p.comment_count_text), 0);
            const totalCollects = posts.reduce((acc, p) => acc + parseCount(p.collect_count_text), 0);

            new Chart(document.getElementById('ratioChart'), {
                type: 'doughnut',
                data: {
                    labels: ['点赞', '评论', '收藏'],
                    datasets: [{
                        data: [totalLikes, totalComments, totalCollects],
                        backgroundColor: ['#fb7185', '#c084fc', '#fbbf24'],
                        borderWidth: 0
                    }]
                },
                options: { maintainAspectRatio: false, cutout: '70%' }
            });

            // Style Analysis
            const emojiRegex = /(\u00a9|\u00ae|[\u2000-\u3300]|\ud83c[\ud000-\udfff]|\ud83d[\ud000-\udfff]|\ud83e[\ud000-\udfff])/g;
            const emojiMap = {};
            let totalWords = 0;
            posts.forEach(p => {
                const emojis = (p.content_text || "").match(emojiRegex) || [];
                emojis.forEach(e => emojiMap[e] = (emojiMap[e] || 0) + 1);
                totalWords += (p.content_text || "").length;
            });
            
            const topEmojis = Object.entries(emojiMap).sort((a, b) => b[1] - a[1]).slice(0, 5);
            const avgLength = Math.round(totalWords / (posts.length || 1));
            
            const styleEl = document.getElementById("style-profile");
            styleEl.innerHTML = `
                <div>
                    <p class="text-xs text-slate-400 uppercase font-bold mb-1">常用表情</p>
                    <div class="flex gap-2">
                        ${topEmojis.map(([e, c]) => `<span class="px-2 py-1 bg-slate-100 rounded-lg text-lg" title="使用${c}次">${e}</span>`).join("")}
                    </div>
                </div>
                <div>
                    <p class="text-xs text-slate-400 uppercase font-bold mb-1">平均篇幅</p>
                    <p class="text-xl font-bold text-slate-800">${avgLength} 字/篇</p>
                </div>
                <div>
                    <p class="text-xs text-slate-400 uppercase font-bold mb-1">核心关键词</p>
                    <div class="flex flex-wrap gap-1">
                        ${sortedTags.slice(0, 5).map(([t, c]) => `<span class="px-2 py-0.5 bg-indigo-50 text-indigo-600 rounded-md text-xs font-medium">${t}</span>`).join("")}
                    </div>
                </div>
            `;
        }

        function renderList() {
            const el = document.getElementById("list");
            el.innerHTML = "";
            const posts = getFilteredList();
            
            posts.forEach(p => {
                const card = document.createElement("div");
                card.className = "glass-card rounded-2xl overflow-hidden flex flex-col shadow-sm hover:shadow-md transition-shadow duration-300";
                
                const tagsHtml = (p.tags || []).map(t => `<span class="text-xs font-medium text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-full">#${t}</span>`).join(" ");
                const date = p.publish_time_text ? p.publish_time_text.split('T')[0] : (p.captured_at ? p.captured_at.split('T')[0] : "");
                
                card.innerHTML = `
                    <div class="p-5 flex-1 flex flex-col">
                        <div class="flex items-start justify-between mb-3">
                            <h4 class="font-bold text-slate-900 leading-snug line-clamp-2">${p.title || "无标题笔记"}</h4>
                            <span class="text-[10px] font-medium text-slate-400 whitespace-nowrap ml-2">${date}</span>
                        </div>
                        <p class="text-sm text-slate-600 line-clamp-3 mb-4 flex-1">${p.content_text || "暂无内容文本..."}</p>
                        <div class="flex flex-wrap gap-1.5 mb-4">${tagsHtml}</div>
                        <div class="flex items-center justify-between pt-4 border-t border-slate-100">
                            <div class="flex items-center gap-4 text-xs font-semibold text-slate-500">
                                <span class="flex items-center gap-1"><svg class="w-4 h-4 text-rose-400" fill="currentColor" viewBox="0 0 20 20"><path d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"></path></svg>${p.like_count_text || 0}</span>
                                <span class="flex items-center gap-1"><svg class="w-4 h-4 text-purple-400" fill="currentColor" viewBox="0 0 20 20"><path d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z"></path></svg>${p.comment_count_text || 0}</span>
                            </div>
                            <a target="_blank" href="${p.post_url || "#"}" class="text-xs font-bold text-indigo-600 hover:text-indigo-800 transition-colors flex items-center gap-0.5">
                                查看详情 <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </a>
                        </div>
                    </div>
                `;
                el.appendChild(card);
            });
        }

        document.getElementById("q").addEventListener("input", e => { state.q = e.target.value; renderList(); });
        document.getElementById("s").addEventListener("change", e => { state.s = e.target.value; renderList(); });

        // Initial Boot
        renderStats();
        renderCharts();
        renderList();
    </script>
</body>
</html>
